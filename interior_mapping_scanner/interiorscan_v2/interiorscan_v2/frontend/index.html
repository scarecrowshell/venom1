<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interior Mapping Scanner v2.0 - Advanced System Visualization</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/3d-force-graph"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #0a0e27;
            color: #e0e0e0;
            overflow: hidden;
        }
        
        #root {
            width: 100vw;
            height: 100vh;
            position: relative;
        }
        
        #graph-container {
            width: 100%;
            height: 100%;
        }
        
        .panel {
            position: absolute;
            background: rgba(15, 20, 40, 0.95);
            border: 1px solid #2a3f5f;
            border-radius: 8px;
            padding: 20px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
            z-index: 1000;
        }
        
        .controls-panel {
            top: 20px;
            left: 20px;
            min-width: 300px;
            max-width: 350px;
            max-height: 90vh;
            overflow-y: auto;
        }
        
        .metrics-panel {
            bottom: 20px;
            left: 20px;
            min-width: 300px;
            background: rgba(15, 20, 40, 0.98);
        }
        
        .anomalies-panel {
            top: 20px;
            right: 20px;
            min-width: 350px;
            max-width: 450px;
            max-height: 90vh;
            overflow-y: auto;
        }
        
        .info-panel {
            bottom: 20px;
            right: 20px;
            min-width: 320px;
            max-width: 400px;
            max-height: 70vh;
            overflow-y: auto;
        }
        
        h2 {
            font-size: 18px;
            margin-bottom: 15px;
            color: #00d4ff;
            border-bottom: 1px solid #2a3f5f;
            padding-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        h3 {
            font-size: 16px;
            margin: 15px 0 10px 0;
            color: #4fc3f7;
        }
        
        .version-badge {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: 700;
            margin-left: auto;
        }
        
        .stat-row {
            display: flex;
            justify-content: space-between;
            margin: 8px 0;
            font-size: 14px;
        }
        
        .stat-label {
            color: #9e9e9e;
        }
        
        .stat-value {
            color: #00ff88;
            font-weight: 600;
        }
        
        .filter-group {
            margin: 15px 0;
        }
        
        .filter-label {
            display: block;
            margin-bottom: 5px;
            font-size: 13px;
            color: #9e9e9e;
        }
        
        select, input[type="range"], input[type="text"], input[type="number"] {
            width: 100%;
            padding: 8px;
            background: #1a2332;
            border: 1px solid #2a3f5f;
            border-radius: 4px;
            color: #e0e0e0;
            font-size: 13px;
        }
        
        input[type="range"] {
            padding: 0;
        }
        
        input[type="checkbox"] {
            margin-right: 8px;
        }
        
        button {
            width: 100%;
            padding: 10px;
            margin: 5px 0;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            border-radius: 4px;
            color: white;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }
        
        button.secondary {
            background: linear-gradient(135deg, #2a3f5f 0%, #1a2332 100%);
        }
        
        .anomaly-item {
            background: #1a2332;
            border-radius: 6px;
            padding: 12px;
            margin: 8px 0;
            border-left: 3px solid;
        }
        
        .anomaly-high {
            border-left-color: #ff4444;
        }
        
        .anomaly-medium {
            border-left-color: #ff9800;
        }
        
        .anomaly-low {
            border-left-color: #ffeb3b;
        }
        
        .anomaly-header {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 6px;
        }
        
        .severity-badge {
            padding: 2px 8px;
            border-radius: 10px;
            font-size: 10px;
            font-weight: 700;
            text-transform: uppercase;
        }
        
        .severity-high {
            background: #ff4444;
            color: white;
        }
        
        .severity-medium {
            background: #ff9800;
            color: black;
        }
        
        .severity-low {
            background: #ffeb3b;
            color: black;
        }
        
        .anomaly-desc {
            font-size: 13px;
            color: #b0b0b0;
        }
        
        .node-info {
            background: #1a2332;
            border-radius: 6px;
            padding: 12px;
            margin: 8px 0;
            border-left: 3px solid #00d4ff;
        }
        
        .node-info-row {
            margin: 5px 0;
            font-size: 13px;
            word-break: break-word;
        }
        
        .node-info-key {
            color: #9e9e9e;
            display: inline-block;
            min-width: 120px;
            vertical-align: top;
        }
        
        .node-info-value {
            color: #e0e0e0;
        }
        
        .legend {
            margin-top: 15px;
        }
        
        .legend-item {
            display: flex;
            align-items: center;
            margin: 8px 0;
            font-size: 13px;
        }
        
        .legend-color {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            margin-right: 10px;
        }
        
        .metric-card {
            background: linear-gradient(135deg, #1a2332 0%, #0f1420 100%);
            border-radius: 8px;
            padding: 12px;
            margin: 8px 0;
            border: 1px solid #2a3f5f;
        }
        
        .metric-value {
            font-size: 24px;
            font-weight: 700;
            color: #00d4ff;
        }
        
        .metric-label {
            font-size: 12px;
            color: #9e9e9e;
            margin-top: 4px;
        }
        
        .auto-refresh-indicator {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-size: 11px;
            color: #4fc3f7;
            padding: 4px 8px;
            background: rgba(79, 195, 247, 0.1);
            border-radius: 12px;
        }
        
        .refresh-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #4fc3f7;
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }
        
        .loading {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-size: 24px;
            color: #00d4ff;
        }
        
        .error {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-size: 18px;
            color: #ff4444;
            text-align: center;
            padding: 20px;
        }
        
        .search-box {
            position: relative;
        }
        
        .search-results {
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            background: #1a2332;
            border: 1px solid #2a3f5f;
            border-radius: 4px;
            margin-top: 4px;
            max-height: 200px;
            overflow-y: auto;
            z-index: 10;
        }
        
        .search-result-item {
            padding: 8px;
            cursor: pointer;
            font-size: 13px;
            border-bottom: 1px solid #2a3f5f;
        }
        
        .search-result-item:hover {
            background: #2a3f5f;
        }
        
        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
            border-bottom: 1px solid #2a3f5f;
        }
        
        .tab {
            padding: 8px 16px;
            cursor: pointer;
            font-size: 13px;
            color: #9e9e9e;
            border-bottom: 2px solid transparent;
            transition: all 0.3s ease;
        }
        
        .tab.active {
            color: #00d4ff;
            border-bottom-color: #00d4ff;
        }
        
        .tab:hover {
            color: #4fc3f7;
        }
        
        ::-webkit-scrollbar {
            width: 8px;
        }
        
        ::-webkit-scrollbar-track {
            background: #1a2332;
        }
        
        ::-webkit-scrollbar-thumb {
            background: #2a3f5f;
            border-radius: 4px;
        }
        
        ::-webkit-scrollbar-thumb:hover {
            background: #3a4f6f;
        }
        
        .capability-badge {
            display: inline-block;
            padding: 2px 6px;
            margin: 2px;
            background: #ff6b6b;
            color: white;
            border-radius: 4px;
            font-size: 10px;
        }
    </style>
</head>
<body>
    <div id="root"></div>
    
    <script type="text/babel">
        const { useState, useEffect, useRef } = React;
        
        const NODE_COLORS = {
            'Process': '#00d4ff',
            'Socket': '#ff6b6b',
            'File': '#4ecdc4',
            'Namespace': '#ffe66d',
        };
        
        function App() {
            const [graphData, setGraphData] = useState(null);
            const [selectedNode, setSelectedNode] = useState(null);
            const [filterType, setFilterType] = useState('all');
            const [minConnections, setMinConnections] = useState(0);
            const [loading, setLoading] = useState(true);
            const [error, setError] = useState(null);
            const [autoRefresh, setAutoRefresh] = useState(false);
            const [refreshInterval, setRefreshInterval] = useState(30);
            const [searchQuery, setSearchQuery] = useState('');
            const [searchResults, setSearchResults] = useState([]);
            const [showSearch, setShowSearch] = useState(false);
            const [activeTab, setActiveTab] = useState('controls');
            const graphRef = useRef();
            const containerRef = useRef();
            const refreshTimerRef = useRef();
            
            useEffect(() => {
                loadGraphData();
            }, []);
            
            useEffect(() => {
                if (autoRefresh) {
                    refreshTimerRef.current = setInterval(() => {
                        loadGraphData();
                    }, refreshInterval * 1000);
                } else {
                    if (refreshTimerRef.current) {
                        clearInterval(refreshTimerRef.current);
                    }
                }
                
                return () => {
                    if (refreshTimerRef.current) {
                        clearInterval(refreshTimerRef.current);
                    }
                };
            }, [autoRefresh, refreshInterval]);
            
            const loadGraphData = async () => {
                try {
                    setLoading(true);
                    const response = await fetch('graph_data.json?' + Date.now());
                    
                    if (!response.ok) {
                        throw new Error('Failed to load graph data. Please run scanner_v2.py first.');
                    }
                    
                    const data = await response.json();
                    setGraphData(data);
                    setError(null);
                } catch (err) {
                    setError(err.message);
                } finally {
                    setLoading(false);
                }
            };
            
            useEffect(() => {
                if (graphData && containerRef.current && !graphRef.current) {
                    initializeGraph();
                }
            }, [graphData]);
            
            const initializeGraph = () => {
                const Graph = ForceGraph3D()
                    (containerRef.current)
                    .graphData(getFilteredData())
                    .nodeLabel(node => `${node.type}: ${node.identifier}`)
                    .nodeColor(node => {
                        // Highlight nodes with anomalies
                        if (graphData.anomalies) {
                            const hasAnomaly = graphData.anomalies.some(a => 
                                a.pid && String(a.pid) === node.identifier
                            );
                            if (hasAnomaly) {
                                return '#ff4444';
                            }
                        }
                        return NODE_COLORS[node.type] || '#888888';
                    })
                    .nodeRelSize(6)
                    .linkColor(() => '#4a5568')
                    .linkOpacity(0.6)
                    .linkWidth(1.5)
                    .onNodeClick(handleNodeClick)
                    .backgroundColor('#0a0e27')
                    .showNavInfo(false);
                
                Graph.d3Force('charge').strength(-120);
                Graph.d3Force('link').distance(50);
                
                graphRef.current = Graph;
            };
            
            const getFilteredData = () => {
                if (!graphData) return { nodes: [], links: [] };
                
                let nodes = [...graphData.nodes];
                let links = [...graphData.links];
                
                if (filterType !== 'all') {
                    nodes = nodes.filter(n => n.type === filterType);
                    const nodeIds = new Set(nodes.map(n => n.id));
                    links = links.filter(l => nodeIds.has(l.source) && nodeIds.has(l.target));
                }
                
                if (minConnections > 0) {
                    const connectionCounts = {};
                    links.forEach(l => {
                        connectionCounts[l.source] = (connectionCounts[l.source] || 0) + 1;
                        connectionCounts[l.target] = (connectionCounts[l.target] || 0) + 1;
                    });
                    
                    nodes = nodes.filter(n => (connectionCounts[n.id] || 0) >= minConnections);
                    const nodeIds = new Set(nodes.map(n => n.id));
                    links = links.filter(l => nodeIds.has(l.source) && nodeIds.has(l.target));
                }
                
                return { nodes, links };
            };
            
            const handleNodeClick = (node) => {
                setSelectedNode(node);
            };
            
            const handleFilterChange = (e) => {
                setFilterType(e.target.value);
                if (graphRef.current) {
                    graphRef.current.graphData(getFilteredData());
                }
            };
            
            const handleConnectionsChange = (e) => {
                setMinConnections(parseInt(e.target.value));
                if (graphRef.current) {
                    graphRef.current.graphData(getFilteredData());
                }
            };
            
            const handleRefresh = () => {
                loadGraphData();
                setTimeout(() => {
                    if (graphRef.current && graphData) {
                        graphRef.current.graphData(getFilteredData());
                    }
                }, 100);
            };
            
            const handleReset = () => {
                if (graphRef.current) {
                    graphRef.current.cameraPosition({ x: 0, y: 0, z: 400 });
                }
            };
            
            const handleSearch = (query) => {
                setSearchQuery(query);
                if (!query || !graphData) {
                    setSearchResults([]);
                    setShowSearch(false);
                    return;
                }
                
                const results = graphData.nodes.filter(node => {
                    const searchStr = JSON.stringify(node).toLowerCase();
                    return searchStr.includes(query.toLowerCase());
                }).slice(0, 10);
                
                setSearchResults(results);
                setShowSearch(results.length > 0);
            };
            
            const handleSearchResultClick = (node) => {
                setSelectedNode(node);
                setShowSearch(false);
                if (graphRef.current) {
                    const distance = 100;
                    graphRef.current.cameraPosition(
                        { x: node.x, y: node.y, z: node.z + distance },
                        node,
                        1000
                    );
                }
            };
            
            if (loading && !graphData) {
                return <div className="loading">Loading system data...</div>;
            }
            
            if (error) {
                return (
                    <div className="error">
                        <div>
                            <div style={{marginBottom: '20px'}}>⚠️ {error}</div>
                            <button onClick={loadGraphData}>Retry</button>
                        </div>
                    </div>
                );
            }
            
            const stats = graphData ? {
                nodes: graphData.nodes.length,
                links: graphData.links.length,
                processes: graphData.nodes.filter(n => n.type === 'Process').length,
                sockets: graphData.nodes.filter(n => n.type === 'Socket').length,
                files: graphData.nodes.filter(n => n.type === 'File').length,
                namespaces: graphData.nodes.filter(n => n.type === 'Namespace').length,
            } : {};
            
            const metrics = graphData?.metrics || {};
            const anomalies = graphData?.anomalies || [];
            
            return (
                <>
                    <div id="graph-container" ref={containerRef}></div>
                    
                    <div className="panel controls-panel">
                        <h2>
                            🔍 Controls
                            <span className="version-badge">v2.0</span>
                        </h2>
                        
                        <div className="tabs">
                            <div 
                                className={`tab ${activeTab === 'controls' ? 'active' : ''}`}
                                onClick={() => setActiveTab('controls')}
                            >
                                Filters
                            </div>
                            <div 
                                className={`tab ${activeTab === 'search' ? 'active' : ''}`}
                                onClick={() => setActiveTab('search')}
                            >
                                Search
                            </div>
                        </div>
                        
                        {activeTab === 'controls' && (
                            <>
                                <div className="filter-group">
                                    <label className="filter-label">Node Type</label>
                                    <select value={filterType} onChange={handleFilterChange}>
                                        <option value="all">All Types</option>
                                        <option value="Process">Processes</option>
                                        <option value="Socket">Sockets</option>
                                        <option value="File">Files</option>
                                        <option value="Namespace">Namespaces</option>
                                    </select>
                                </div>
                                
                                <div className="filter-group">
                                    <label className="filter-label">
                                        Min Connections: {minConnections}
                                    </label>
                                    <input 
                                        type="range" 
                                        min="0" 
                                        max="10" 
                                        value={minConnections}
                                        onChange={handleConnectionsChange}
                                    />
                                </div>
                                
                                <div className="filter-group">
                                    <label className="filter-label">
                                        <input 
                                            type="checkbox" 
                                            checked={autoRefresh}
                                            onChange={(e) => setAutoRefresh(e.target.checked)}
                                        />
                                        Auto-refresh
                                    </label>
                                    {autoRefresh && (
                                        <>
                                            <input 
                                                type="number" 
                                                min="5" 
                                                max="300" 
                                                value={refreshInterval}
                                                onChange={(e) => setRefreshInterval(parseInt(e.target.value))}
                                                placeholder="Interval (seconds)"
                                            />
                                            <div className="auto-refresh-indicator">
                                                <div className="refresh-dot"></div>
                                                Active (every {refreshInterval}s)
                                            </div>
                                        </>
                                    )}
                                </div>
                            </>
                        )}
                        
                        {activeTab === 'search' && (
                            <div className="filter-group">
                                <label className="filter-label">Search Nodes</label>
                                <div className="search-box">
                                    <input 
                                        type="text" 
                                        placeholder="Search by PID, name, path..."
                                        value={searchQuery}
                                        onChange={(e) => handleSearch(e.target.value)}
                                    />
                                    {showSearch && searchResults.length > 0 && (
                                        <div className="search-results">
                                            {searchResults.map(node => (
                                                <div 
                                                    key={node.id}
                                                    className="search-result-item"
                                                    onClick={() => handleSearchResultClick(node)}
                                                >
                                                    {node.type}: {node.identifier} 
                                                    {node.name && ` (${node.name})`}
                                                </div>
                                            ))}
                                        </div>
                                    )}
                                </div>
                            </div>
                        )}
                        
                        <button onClick={handleRefresh}>🔄 Refresh Now</button>
                        <button onClick={handleReset} className="secondary">🎯 Reset Camera</button>
                        
                        <div className="legend">
                            <h3>Legend</h3>
                            {Object.entries(NODE_COLORS).map(([type, color]) => (
                                <div key={type} className="legend-item">
                                    <div className="legend-color" style={{backgroundColor: color}}></div>
                                    <span>{type}s</span>
                                </div>
                            ))}
                            <div className="legend-item">
                                <div className="legend-color" style={{backgroundColor: '#ff4444'}}></div>
                                <span>Anomaly Detected</span>
                            </div>
                        </div>
                        
                        <h3>Statistics</h3>
                        <div className="stat-row">
                            <span className="stat-label">Total Nodes:</span>
                            <span className="stat-value">{stats.nodes}</span>
                        </div>
                        <div className="stat-row">
                            <span className="stat-label">Total Links:</span>
                            <span className="stat-value">{stats.links}</span>
                        </div>
                        <div className="stat-row">
                            <span className="stat-label">Processes:</span>
                            <span className="stat-value">{stats.processes}</span>
                        </div>
                        <div className="stat-row">
                            <span className="stat-label">Anomalies:</span>
                            <span className="stat-value" style={{color: anomalies.length > 0 ? '#ff4444' : '#00ff88'}}>
                                {anomalies.length}
                            </span>
                        </div>
                        {metrics.scan_duration && (
                            <div className="stat-row">
                                <span className="stat-label">Scan Time:</span>
                                <span className="stat-value">{metrics.scan_duration}s</span>
                            </div>
                        )}
                    </div>
                    
                    {anomalies.length > 0 && (
                        <div className="panel anomalies-panel">
                            <h2>⚠️ Anomalies ({anomalies.length})</h2>
                            {anomalies.slice(0, 10).map((anomaly, idx) => (
                                <div 
                                    key={idx} 
                                    className={`anomaly-item anomaly-${anomaly.severity}`}
                                >
                                    <div className="anomaly-header">
                                        <span className={`severity-badge severity-${anomaly.severity}`}>
                                            {anomaly.severity}
                                        </span>
                                        <strong>{anomaly.type}</strong>
                                    </div>
                                    <div className="anomaly-desc">{anomaly.description}</div>
                                </div>
                            ))}
                            {anomalies.length > 10 && (
                                <div style={{textAlign: 'center', marginTop: '10px', color: '#9e9e9e', fontSize: '13px'}}>
                                    ... and {anomalies.length - 10} more
                                </div>
                            )}
                        </div>
                    )}
                    
                    {metrics && Object.keys(metrics).length > 0 && (
                        <div className="panel metrics-panel">
                            <h2>📊 Metrics</h2>
                            <div className="metric-card">
                                <div className="metric-value">{metrics.total_nodes}</div>
                                <div className="metric-label">Total Nodes</div>
                            </div>
                            {metrics.network_stats?.established_count !== undefined && (
                                <div className="metric-card">
                                    <div className="metric-value">{metrics.network_stats.established_count}</div>
                                    <div className="metric-label">Active Connections</div>
                                </div>
                            )}
                            {metrics.process_states && (
                                <div className="metric-card">
                                    <div className="metric-label">Process States</div>
                                    {Object.entries(metrics.process_states).map(([state, count]) => (
                                        <div key={state} className="stat-row">
                                            <span className="stat-label">{state}:</span>
                                            <span className="stat-value">{count}</span>
                                        </div>
                                    ))}
                                </div>
                            )}
                        </div>
                    )}
                    
                    {selectedNode && (
                        <div className="panel info-panel">
                            <h2>📊 Node Details</h2>
                            <div className="node-info">
                                <div className="node-info-row">
                                    <span className="node-info-key">Type:</span>
                                    <span className="node-info-value">{selectedNode.type}</span>
                                </div>
                                <div className="node-info-row">
                                    <span className="node-info-key">ID:</span>
                                    <span className="node-info-value">{selectedNode.identifier}</span>
                                </div>
                                
                                {selectedNode.suspicious_caps && selectedNode.suspicious_caps.length > 0 && (
                                    <div className="node-info-row">
                                        <span className="node-info-key">⚠️ Suspicious Caps:</span>
                                        <div>
                                            {selectedNode.suspicious_caps.map(cap => (
                                                <span key={cap} className="capability-badge">{cap}</span>
                                            ))}
                                        </div>
                                    </div>
                                )}
                                
                                {Object.entries(selectedNode)
                                    .filter(([key]) => !['id', 'type', 'identifier', 'x', 'y', 'z', 'vx', 'vy', 'vz', 'index', 'scan_time'].includes(key))
                                    .map(([key, value]) => (
                                        <div key={key} className="node-info-row">
                                            <span className="node-info-key">{key}:</span>
                                            <span className="node-info-value">
                                                {Array.isArray(value) 
                                                    ? value.length > 0 ? value.join(', ') : 'None'
                                                    : typeof value === 'object' 
                                                        ? JSON.stringify(value, null, 2)
                                                        : String(value || 'N/A')}
                                            </span>
                                        </div>
                                    ))}
                            </div>
                            
                            <button onClick={() => setSelectedNode(null)} className="secondary">Close</button>
                        </div>
                    )}
                </>
            );
        }
        
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
